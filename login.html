<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Login - DIBA FBC</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <img src="ESCUDO.png" alt="Escudo DIBA FBC" class="logo">
           <form id="login-form">
    <div class="input-group">
        <input type="text" id="email" placeholder="Usuario" required>
    </div>
    <div class="input-group">
        <input type="password" id="password" placeholder="Contraseña" required>
    </div>
    <button type="submit" class="btn black">Ingresar</button>
</form>
        </div>    
    </div>
</body>
</html>
