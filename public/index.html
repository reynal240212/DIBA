<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIBA FBC - Gestión y Administración del Club</title>
    <style>
     .interaction-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    background: rgba(0, 0, 0, 0.6);
    padding: 2rem;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 320px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
}

.interaction-box input {
    width: 100%;
    padding: 0.8rem;
    border: none;
    border-radius: 5px;
    font-size: 1rem;
    margin-bottom: 1rem;
    background-color: #ffee00;
    color: #121212;
    text-align: center;
}

.interaction-box button {
    width: 100%;
    padding: 0.8rem;
    border: none;
    border-radius: 5px;
    font-size: 1rem;
    font-weight: bold;
    background-color: rgba(255, 247, 5, 0.83);
    cursor: pointer;
    transition: background 0.3s ease;
}

.interaction-box button:hover {
    background-color: #333;
    color: #fff;
}
    </style>
</head>
<body>
    <header>
        <img src="ESCUDO.png" alt="DIBA FBC Logo">
        <nav>
            <ul>
                <li><a href="/gestion_documentos.html">Gestión Documental</a></li>
                <li>
                    <a href="/ficha_tecnica.html">Ficha Técnica</a>
                    <ul class="submenu">
                        <li><a href="#">Detalles Técnicos</a></li>
                        <li><a href="#">Estadísticas</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <div class="interaction-box">
        <input type="text" id="searchInput" placeholder="Buscar jugador...">
        <button onclick="buscarJugador()">Buscar</button>
    </div>

    <script>
        let jugadores = [];

        document.addEventListener("DOMContentLoaded", function () {
            fetch("data/Ficha_de_Registro_DIBA_FBC.csv")
                .then(response => response.text())
                .then(data => procesarCSV(data))
                .catch(error => console.error("Error al cargar el CSV:", error));
        });

        function procesarCSV(texto) {
            const lineas = texto.split("\n");
            const headers = lineas[0].split(",");

            jugadores = lineas.slice(1).map(linea => {
                const valores = linea.split(",");
                let jugador = {};
                headers.forEach((header, index) => {
                    jugador[header.trim()] = valores[index] ? valores[index].trim() : "";
                });
                return jugador;
            });

            console.log("Jugadores cargados:", jugadores);
        }

        function buscarJugador() {
            const query = document.getElementById("searchInput").value.trim().toLowerCase();
            if (query === "") {
                alert("Por favor, ingresa un nombre.");
                return;
            }

            const jugadorEncontrado = jugadores.find(jugador =>
                jugador["Nombres"].toLowerCase().includes(query) ||
                jugador["Apellidos"].toLowerCase().includes(query)
            );

            if (!jugadorEncontrado) {
                alert("No se encontraron jugadores con ese nombre.");
                return;
            }

            const params = new URLSearchParams(jugadorEncontrado);
            window.location.href = `/ficha.html?${params.toString()}`;
        }
    </script>
</body>
</html>
