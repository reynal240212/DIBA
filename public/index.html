<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DIBA FBC - Estilo Barça Adaptado</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Íconos de Font Awesome (opcional) -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  
  <style>
  /* =============================
       RESET Y VARIABLES
    ============================== */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --color-primario: #000;     /* Negro */
    --color-secundario: #ffd700;/* Dorado */
    --color-texto: #fff;        /* Texto blanco */
  }

  /* =============================
       BODY - Fondo animado
    ============================== */
  body {
    font-family: Arial, sans-serif;
    color: var(--color-texto);
    background: linear-gradient(-45deg, #f8aa00, #000, #ffd700, #000);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
  }

  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* =============================
       LAYOUT PRINCIPAL
    ============================== */
  .container {
    display: grid;
    grid-template-columns: 250px 1fr 300px; /* Barra izq - contenido - barra der */
    gap: 20px;
    max-width: 1300px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
  }

  /* =============================
       BARRA LATERAL IZQUIERDA
    ============================== */
  .sidebar-left {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Logo DIBA */
  .logo {
    width: 80px;
    height: auto;
    margin-bottom: 20px;
  }

  /* Menú principal */
  .nav-links {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .nav-links a {
    color: var(--color-texto);
    text-decoration: none;
    font-size: 1.05rem;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    font-weight: bold;
  }

  .nav-links a:hover {
    color: #bbb;
  }

  /* Botón Acceder */
  .btn-acceder {
    margin-top: 10px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background-color: #fff;
    color: #000;
    border: 2px solid #000;
    border-radius: 4px;
    font-weight: bold;
    cursor: pointer;
    text-decoration: none;
    font-size: 1rem;
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  .btn-acceder:hover {
    background-color: #000;
    color: #fff;
  }

  /* =============================
       MEDIA QUERIES
    ============================== */
  @media (max-width: 1024px) {
    .container {
      grid-template-columns: 80px 1fr 250px; /* Ajusta anchos */
    }
    .logo {
      width: 50px;
    }
  }

  @media (max-width: 768px) {
    .container {
      grid-template-columns: 80px 1fr; /* Ocultamos barra derecha */
    }
    .sidebar-right {
      display: none;
    }
  }

  @media (max-width: 480px) {
    .container {
      grid-template-columns: 1fr; /* Una sola columna */
    }
    .sidebar-left {
      flex-direction: row;
      align-items: center;
      overflow-x: auto;
    }
    .nav-links {
      flex-direction: row;
      gap: 10px;
    }
    .btn-acceder {
      flex-shrink: 0;
    }
  }
  </style>
</head>
<body>
  <!-- Aquí sigue el resto de tu código HTML sin cambios -->
</body>
</html>
