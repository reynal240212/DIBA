<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DIBA FBC - Responsive</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Íconos de Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" 
    integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background-color: #fff;
      color: #333;
    }
    a {
      text-decoration: none;
      color: inherit;
    }
    /* Variables */
    :root {
      --header-height: 60px;
      --grana: #a50044;
      --menu-bg: #b3004c;
      --texto-claro: #ffffff;
    }
    /* Header */
    header {
      background: var(--grana);
      color: var(--texto-claro);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
      z-index: 100;
    }
    .logo {
      height: 40px;
    }
    /* Desktop Navigation */
    .nav-desktop {
      display: flex;
      gap: 1.5rem;
    }
    .nav-desktop a {
      font-weight: bold;
      text-transform: uppercase;
      transition: color 0.3s;
    }
    .nav-desktop a:hover {
      color: var(--texto-claro);
      opacity: 0.8;
    }
    /* Mobile Navigation: Checkbox Hack */
    .nav-toggle {
      display: none;
    }
    .hamburger {
      display: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: var(--texto-claro);
    }
    /* Mobile Drawer */
    .mobile-nav {
      position: fixed;
      top: var(--header-height);
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--menu-bg);
      transform: translateY(-100%);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99;
    }
    .mobile-nav a {
      color: var(--texto-claro);
      font-size: 1.5rem;
      padding: 1rem;
      width: 100%;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.3);
    }
    .mobile-nav a:last-child {
      border-bottom: none;
    }
    /* Mostrar menú móvil cuando se active el checkbox */
    #nav-toggle:checked ~ .mobile-nav {
      transform: translateY(0);
    }
    /* Responsive: en pantallas pequeñas se oculta la navegación desktop y se muestra el hamburger */
    @media (max-width: 768px) {
      .nav-desktop {
        display: none;
      }
      .hamburger {
        display: block;
      }
    }
    @media (min-width: 769px) {
      .mobile-nav {
        display: none;
      }
    }
    /* Content */
    .content {
      margin-top: var(--header-height);
      padding: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <img src="ESCUDO.png" alt="Logo DIBA FBC" class="logo">
    <!-- Navegación para escritorio -->
    <nav class="nav-desktop">
      <a href="index.html"><i class="fa fa-home"></i> Inicio</a>
      <a href="Historia.html"><i class="fa fa-file"></i> Historia</a>
      <a href="ficha.html"><i class="fa fa-clipboard"></i> Ficha Técnica</a>
      <a href="NormasyReglamentos.html"><i class="fa fa-users"></i> Normas y Reglamentos</a>
      <a href="partidos.html"><i class="fa fa-calendar"></i> Partidos</a>
      <a href="noticias.html"><i class="fa fa-newspaper"></i> Noticias</a>
      <a href="contacto.html"><i class="fa fa-envelope"></i> Contacto</a>
    </nav>
    <!-- Botón hamburguesa para móvil -->
    <label for="nav-toggle" class="hamburger">
      <i class="fa fa-bars"></i>
    </label>
    <input type="checkbox" id="nav-toggle" class="nav-toggle">
  </header>
  
  <!-- Menú móvil: Solo muestra opciones de Registro e Iniciar Sesión -->
  <nav class="mobile-nav">
    <a href="registro.html"><i class="fa fa-user-plus"></i> Registrarse</a>
    <a href="login.html"><i class="fa fa-sign-in-alt"></i> Iniciar Sesión</a>
  </nav>
  
  <div class="content">
    <!-- Contenido principal -->
    <h1>Bienvenido a DIBA FBC</h1>
    <p>Contenido de la página...</p>
  </div>
</body>
</html>
