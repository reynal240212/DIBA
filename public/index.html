/* ===============================
   RESETEO Y VARIABLES
=============================== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Paleta de colores */
:root {
  --azul-turquesa: #004D73;  /* Azul turquesa oscuro */
  --grana: #800020;          /* Grana */
  --dorado: #FFD700;         /* Dorado amarillo */
  --texto-claro: #ffffff;
  --texto-oscuro: #333333;
  --fondo-gris: #f4f4f4;
  --bg-patron: #2C2C2C;
}

body {
  font-family: 'Lato', sans-serif;
  background: var(--bg-patron) url('pattern.png') repeat;
  color: var(--texto-oscuro);
  padding-top: 70px;
}

a {
  text-decoration: none;
  color: inherit;
}

/* ===============================
   NAVBAR
=============================== */
.navbar {
  background-color: var(--azul-turquesa) !important;
}
.navbar-brand img {
  width: 50px;
}
.navbar-nav .nav-link:hover {
  color: var(--dorado) !important;
}

/* ===============================
   HERO
=============================== */
.hero {
  position: relative;
  background: url("fondo.jpg") center/cover no-repeat;
  height: 400px;
  color: var(--texto-claro);
  overflow: hidden;
  margin-bottom: 2rem;
}
.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
}
.hero-content {
  position: relative;
  z-index: 2;
  text-align: center;
  top: 50%;
  transform: translateY(-50%);
}
.hero-title {
  font-family: 'Dancing Script', cursive;
  font-size: 3rem;
  letter-spacing: 2px;
  margin-bottom: 1rem;
  color: var(--dorado);
}
.hero-subtitle {
  font-family: 'Lato', sans-serif;
  font-size: 1.25rem;
  color: var(--texto-claro);
}

/* ===============================
   SECCIÓN ENTRENAMIENTOS (CARDS)
=============================== */
.entrenamiento {
  background: linear-gradient(to bottom, var(--fondo-gris), #e9ecef);
  padding: 50px 0;
}
.entrenamiento .card {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  transition: transform 0.3s, box-shadow 0.3s;
}
.entrenamiento .card:hover {
  transform: translateY(-5px);
  box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
}
.entrenamiento .card-body img {
  width: 100px;
  border-radius: 50%;
  border: 3px solid var(--azul-turquesa);
  padding: 5px;
  background: #fff;
  margin-bottom: 15px;
}
.entrenamiento .card-title {
  font-size: 1.8rem;
  font-weight: bold;
  color: var(--grana);
  margin-bottom: 15px;
  text-transform: uppercase;
}
.entrenamiento .card-text strong {
  color: var(--azul-turquesa);
}

/* ===============================
   SECCIÓN DE VIDEOS (Historias)
=============================== */
.videos-section {
  background: #fff;
  padding: 50px 0;
}
.videos-section h2 {
  color: var(--azul-turquesa);
  font-weight: bold;
  text-transform: uppercase;
  margin-bottom: 2rem;
  text-align: center;
}
.videos-container {
  display: flex;
  overflow-x: auto;
  gap: 1rem;
}
.video-card {
  flex: 0 0 auto;
  background-color: #f4f4f4;
  border-radius: 8px;
  min-width: 200px;
  max-width: 250px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  overflow: hidden;
}
.video-card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
}
.video-card .video-info {
  padding: 0.75rem;
}
.video-card .video-info h5 {
  font-size: 1rem;
  font-weight: bold;
  color: var(--azul-turquesa);
}
.video-card .btn {
  background-color: var(--azul-turquesa);
  color: var(--texto-claro);
  border: none;
}
.video-card .btn:hover {
  background-color: var(--dorado);
  color: var(--texto-oscuro);
}

/* ===============================
   SECCIÓN PATROCINADORES
=============================== */
.okeysport-logo {
  filter: brightness(0) invert(1);
  transition: filter 0.3s;
}
.okeysport-logo:hover {
  filter: brightness(0.3) invert(1.2);
}
.sponsor-logo {
  max-height: 80px;
  width: 100%;
  object-fit: contain;
  display: block;
  margin: 0 auto;
}
.sponsors h3 {
  color: var(--dorado);
  text-transform: uppercase;
  margin-bottom: 2rem;
  text-align: center;
}

/* ===============================
   BOTONES
=============================== */
.btn {
  background-color: var(--azul-turquesa);
  color: var(--texto-claro);
  border: none;
  transition: background 0.3s, color 0.3s;
}
.btn:hover {
  background-color: var(--dorado);
  color: var(--texto-oscuro);
}

/* ===============================
   FOOTER
=============================== */
footer {

  color: var(--texto-claro);
  padding: 2rem 0;
}
footer a {

}
footer a:hover {

  color: var(--dorado);
}
.footer-brand {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.footer-brand img {
  width: 60px;
  margin-bottom: 1rem;
}
