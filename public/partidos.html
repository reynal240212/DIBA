<section id="partidos">
  <div class="container">
    <h2>Programar Partido</h2>
    <form class="partido-form">
      <div class="form-group">
        <label for="fecha">Fecha:</label>
        <input type="date" id="fecha" name="fecha">
      </div>
      <div class="form-group">
        <label for="hora">Hora:</label>
        <input type="time" id="hora" name="hora">
      </div>
      <div class="form-group">
        <label for="equipoRival">Equipo Rival:</label>
        <input type="text" id="equipoRival" name="equipoRival" placeholder="Nombre del equipo rival">
      </div>
      <div class="form-group">
        <label for="lugar">Ubicación:</label>
        <input type="text" id="lugar" name="lugar" placeholder="Lugar del partido">
      </div>
      <div class="form-group">
        <label for="lugar">Valor $:</label>
        <input type="int" id="valor" name="valor" placeholder="Valor del albitraje">
      </div>
      <div class="form-group">
        <label for="tipo">Tipo:</label>
        <select id="tipo" name="tipo">
          <option value="cuartos">Amistoso</option>
          <option value="semifinal">campeonato</option>
        </select>
      </div>
      <button type="submit">Notificar</button>
    </form>
  </div>
</section>
