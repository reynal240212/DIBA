<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noticias - DIBA FBC</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="container">
      <img src="ESCUDO.png" alt="DIBA FBC Logo" class="logo">
      <nav>
        <ul class="menu">
          <li><a href="index.html">Inicio</a></li>
          <li><a href="documentos.html">Gestión Documental</a></li>
          <li><a href="ficha.html">Ficha Técnica</a></li>
          <li><a href="jugadores.html">Jugadores</a></li>
          <li><a href="contacto.html">Contacto</a></li>
        </ul>
      </nav>
    </div>
  </header>
  
  <section id="partidos">
    <div class="container">
      <h2>Programar Partido</h2>
      <form class="partido-form" onsubmit="enviarCorreo(event)">
        <div class="form-group">
          <label for="fecha">Fecha:</label>
          <input type="date" id="fecha" name="fecha">
        </div>
        <div class="form-group">
          <label for="hora">Hora:</label>
          <input type="time" id="hora" name="hora">
        </div>
        <div class="form-group">
          <label for="equipoRival">Equipo Rival:</label>
          <input type="text" id="equipoRival" name="equipoRival" placeholder="Nombre del equipo rival">
        </div>
        <div class="form-group">
          <label for="lugar">Ubicación:</label>
          <input type="text" id="lugar" name="lugar" placeholder="Lugar del partido">
        </div>
        <div class="form-group">
          <label for="valor">Valor $:</label>
          <input type="number" id="valor" name="valor" placeholder="Valor del arbitraje">
        </div>
        <div class="form-group">
          <label for="tipo">Tipo:</label>
          <select id="tipo" name="tipo">
            <option value="amistoso">Amistoso</option>
            <option value="campeonato">Campeonato</option>
          </select>
        </div>
        <button type="submit">Notificar</button>
      </form>
    </div>
  </section>
  
  <footer>
    <div class="container">
      <p>&copy; 2025 DIBA FBC. Todos los derechos reservados.</p>
    </div>
  </footer>
  
  <script>
    function enviarCorreo(event) {
      event.preventDefault(); // Evita el envío normal del formulario

      // Recopila la información del formulario
      var fecha = document.getElementById('fecha').value;
      var hora = document.getElementById('hora').value;
      var equipoRival = document.getElementById('equipoRival').value;
      var lugar = document.getElementById('lugar').value;
      var valor = document.getElementById('valor').value;
      var tipo = document.getElementById('tipo').value;

      // Construye el asunto y cuerpo del mensaje
      var subject = encodeURIComponent("Programar Partido - DIBA FBC");
      var body = encodeURIComponent(
        "Información del partido:\n" +
        "Fecha: " + fecha + "\n" +
        "Hora: " + hora + "\n" +
        "Equipo Rival: " + equipoRival + "\n" +
        "Ubicación: " + lugar + "\n" +
        "Valor: " + valor + "\n" +
        "Tipo: " + tipo
      );

      // Reemplaza 'tu-correo@dominio.com' con la dirección de correo a la que deseas enviar la información
      window.location.href = "reynal24002@gmail.com?subject=" + subject + "&body=" + body;
    }
  </script>
</body>
</html>
