<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Noticias - DIBA FBC</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --azul: #003399;
      --grana: #a50044;
      --rojo: #ff0000;
      --amarillo: #ffd700;
      --texto-claro: #ffffff;
      --texto-oscuro: #333333;
      --fondo-gris: #f4f4f4;
    }
    body {
      font-family: Arial, sans-serif;
      background: var(--fondo-gris);
      color: var(--texto-oscuro);
      margin: 0;
      padding: 1rem;
    }
    /* (Otros estilos que tengas en styles.css) */
  </style>
</head>
<body>
  <header>
    <div class="container">
      <img src="ESCUDO.png" alt="DIBA FBC Logo" class="logo">
      <nav>
        <ul class="menu">
          <li><a href="index.html">Inicio</a></li>
          <li><a href="documentos.html">Gestión Documental</a></li>
          <li><a href="ficha.html">Ficha Técnica</a></li>
          <li><a href="jugadores.html">Jugadores</a></li>
          <li><a href="contacto.html">Contacto</a></li>
        </ul>
      </nav>
    </div>
  </header>
  
  <!-- Formulario para enviar datos vía WhatsApp -->
  <form class="partido-form" onsubmit="enviarWhatsapp(event)">
    <div class="form-group">
      <label for="fecha">Fecha:</label>
      <input type="date" id="fecha" name="fecha" required>
    </div>
    <div class="form-group">
      <label for="hora">Hora:</label>
      <input type="time" id="hora" name="hora" required>
    </div>
    <div class="form-group">
      <label for="equipoRival">Equipo Rival:</label>
      <input type="text" id="equipoRival" name="equipoRival" placeholder="Nombre del equipo rival" required>
    </div>
    <div class="form-group">
      <label for="lugar">Ubicación:</label>
      <input type="text" id="lugar" name="lugar" placeholder="Lugar del partido" required>
    </div>
    <div class="form-group">
      <label for="valor">Valor $:</label>
      <input type="number" id="valor" name="valor" placeholder="Valor del arbitraje" required>
    </div>
    <div class="form-group">
      <label for="tipo">Tipo:</label>
      <select id="tipo" name="tipo" required>
        <option value="amistoso">Amistoso</option>
        <option value="campeonato">Campeonato</option>
      </select>
    </div>
    <button type="submit">Notificar por WhatsApp</button>
  </form>

  <footer>
    <div class="container">
      <p>&copy; 2025 DIBA FBC. Todos los derechos reservados.</p>
    </div>
  </footer>
  
  <script>
    function enviarWhatsapp(event) {
      event.preventDefault(); // Evita el envío normal del formulario

      // Recopila la información del formulario
      const fecha = document.getElementById('fecha').value;
      const hora = document.getElementById('hora').value;
      const equipoRival = document.getElementById('equipoRival').value;
      const lugar = document.getElementById('lugar').value;
      const valor = document.getElementById('valor').value;
      const tipo = document.getElementById('tipo').value;

      // Construye el mensaje sin codificar aún
      const mensaje = "Información del partido:\n" +
                      "Fecha: " + fecha + "\n" +
                      "Hora: " + hora + "\n" +
                      "Equipo Rival: " + equipoRival + "\n" +
                      "Ubicación: " + lugar + "\n" +
                      "Valor: " + valor + "\n" +
                      "Tipo: " + tipo;

      // Llama a la función para enviar el mensaje a múltiples números
      enviarWhatsappMultiple(mensaje);
    }

    function enviarWhatsappMultiple(mensaje) {
      // Lista de números en formato internacional (sin + ni espacios)
      const numeros = [
        "3042034755",
        "3148350983",
        "3242222035",
        "3043607874",
        "3012901980",
        "3013637273",
        "3016341284",
        "3242468511",
        "311794894",
        "3187269344",
        "3242653101",
        "3148317030",
        "3043607874",
        "3105463504",
        "3007472389",
        "3212159255",
        "3043219871",
        "3215369885",
        "3215369885",
        "3003292991",
        "3116280441",
        "3023076553"
      ];

      // Para evitar bloqueos, podemos usar un retardo entre aperturas
      numeros.forEach((num, index) => {
        setTimeout(() => {
          const url = "https://wa.me/" + num + "?text=" + encodeURIComponent(mensaje);
          window.open(url, '_blank');
        }, index * 500); // 500 ms entre cada apertura
      });
    }
  </script>
</body>
</html>
