<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Noticias - DIBA FBC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google Fonts (opcional) -->
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,500,700&display=swap" rel="stylesheet">
  <!-- Íconos de Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    /* ================================
       VARIABLES DE COLOR
    =================================*/
    :root {
      --azul: #003399;
      --grana: #a50044;
      --rojo: #ff0000;
      --amarillo: #ffd700;
      --texto-claro: #ffffff;
      --texto-oscuro: #333333;
      --fondo-gris: #f4f4f4;
    }

    /* ================================
       RESET Y BASE
    =================================*/
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Roboto', sans-serif;
      background-color: var(--fondo-gris);
      color: var(--texto-oscuro);
      line-height: 1.6;
      overflow-x: hidden;
    }
    a {
      text-decoration: none;
      color: inherit;
    }
    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 1rem;
    }
    
    /* ================================
       HEADER
    =================================*/
    header {
      background-color: var(--grana);
      padding: 1rem 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      margin-bottom: 1rem;
    }
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .logo {
      width: 60px;
      transition: transform 0.3s;
    }
    .logo:hover {
      transform: scale(1.1);
    }
    .nav-links {
      display: flex;
      gap: 1.5rem;
    }
    .nav-links a {
      color: var(--texto-claro);
      font-weight: 500;
      text-transform: uppercase;
      transition: color 0.3s, transform 0.3s;
    }
    .nav-links a:hover {
      color: var(--amarillo);
      transform: scale(1.05);
    }
    
    /* ================================
       HERO
    =================================*/
    .hero {
      position: relative;
      width: 100%;
      height: 450px;
      background: url('fondo.jpg') center center no-repeat;
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      margin-bottom: 2rem;
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.8));
      z-index: 1;
      animation: fadeIn 3s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .hero-content {
      position: relative;
      z-index: 2;
      color: var(--texto-claro);
      max-width: 800px;
      padding: 1rem;
      animation: slideUp 1s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .hero-content h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
    }
    .hero-content p {
      font-size: 1.2rem;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    }
    
    /* ================================
       FORMULARIO (PARTIDOS)
    =================================*/
    .partido-form {
      background-color: var(--texto-claro);
      max-width: 600px;
      margin: 2rem auto;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .partido-form .form-group {
      margin-bottom: 1.5rem;
    }
    .partido-form label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: bold;
      color: var(--grana);
    }
    .partido-form input,
    .partido-form select {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
    }
    .partido-form input:focus,
    .partido-form select:focus {
      outline: none;
      border-color: var(--amarillo);
      box-shadow: 0 0 5px rgba(255,215,0,0.5);
    }
    .partido-form button {
      background-color: var(--grana);
      color: var(--texto-claro);
      border: none;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    .partido-form button:hover {
      background-color: var(--amarillo);
      color: var(--texto-oscuro);
    }
    
    /* ================================
       FOOTER
    =================================*/
    footer {
      background-color: var(--azul);
      color: var(--texto-claro);
      padding: 2rem 0;
      margin-top: 2rem;
      text-align: center;
    }
    footer p {
      font-size: 0.9rem;
    }
    
    /* ================================
       RESPONSIVE
    =================================*/
    @media (max-width: 768px) {
      .hero {
        height: 350px;
      }
      .hero-content h1 {
        font-size: 2.5rem;
      }
      .hero-content p {
        font-size: 1rem;
      }
      .menu {
        flex-direction: column;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="container top-bar">
      <img src="ESCUDO.png" alt="DIBA FBC Logo" class="logo">
      <nav>
        <ul class="menu">
          <li><a href="index.html">Inicio</a></li>
          <li><a href="documentos.html">Gestión Documental</a></li>
          <li><a href="ficha.html">Ficha Técnica</a></li>
          <li><a href="jugadores.html">Jugadores</a></li>
          <li><a href="contacto.html">Contacto</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <h1>Noticias y Partidos</h1>
      <p>Mantente al tanto de las novedades y encuentros de DIBA FBC</p>
    </div>
  </section>

  <!-- FORMULARIO PARA NOTIFICAR PARTIDOS -->
  <section class="container">
    <form class="partido-form" onsubmit="enviarWhatsapp(event)">
      <div class="form-group">
        <label for="fecha">Fecha:</label>
        <input type="date" id="fecha" name="fecha" required>
      </div>
      <div class="form-group">
        <label for="hora">Hora:</label>
        <input type="time" id="hora" name="hora" required>
      </div>
      <div class="form-group">
        <label for="equipoRival">Equipo Rival:</label>
        <input type="text" id="equipoRival" name="equipoRival" placeholder="Nombre del equipo rival" required>
      </div>
      <div class="form-group">
        <label for="lugar">Ubicación:</label>
        <input type="text" id="lugar" name="lugar" placeholder="Lugar del partido" required>
      </div>
      <div class="form-group">
        <label for="valor">Valor $:</label>
        <input type="number" id="valor" name="valor" placeholder="Valor del arbitraje" required>
      </div>
      <div class="form-group">
        <label for="tipo">Tipo:</label>
        <select id="tipo" name="tipo" required>
          <option value="amistoso">Amistoso</option>
          <option value="campeonato">Campeonato</option>
        </select>
      </div>
      <button type="submit">Notificar por WhatsApp</button>
    </form>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="container">
      <p>&copy; 2025 DIBA FBC. Todos los derechos reservados.</p>
    </div>
  </footer>
  
  <script>
    function enviarWhatsapp(event) {
      event.preventDefault(); // Evita el envío normal del formulario

      // Recopila la información del formulario
      const fecha = document.getElementById('fecha').value;
      const hora = document.getElementById('hora').value;
      const equipoRival = document.getElementById('equipoRival').value;
      const lugar = document.getElementById('lugar').value;
      const valor = document.getElementById('valor').value;
      const tipo = document.getElementById('tipo').value;

      // Construye el mensaje
      const mensaje = "Información del partido:\n" +
                      "Fecha: " + fecha + "\n" +
                      "Hora: " + hora + "\n" +
                      "Equipo Rival: " + equipoRival + "\n" +
                      "Ubicación: " + lugar + "\n" +
                      "Valor: " + valor + "\n" +
                      "Tipo: " + tipo;

      // Llama a la función para enviar el mensaje a múltiples números
      enviarWhatsappMultiple(mensaje);
    }

    function enviarWhatsappMultiple(mensaje) {
      // Lista de números en formato internacional (sin + ni espacios)
      const numeros = [
        "3042034755",
        "3148350983",
        "3242222035",
        "3043607874",
        "3012901980",
        "3013637273",
        "3016341284",
        "3242468511",
        "311794894",
        "3187269344",
        "3242653101",
        "3148317030",
        "3043607874",
        "3105463504",
        "3007472389",
        "3212159255",
        "3043219871",
        "3215369885",
        "3215369885",
        "3003292991",
        "3116280441",
        "3023076553"
      ];

      // Para evitar bloqueos, se abre cada enlace con un retardo
      numeros.forEach((num, index) => {
        setTimeout(() => {
          const url = "https://wa.me/" + num + "?text=" + encodeURIComponent(mensaje);
          window.open(url, '_blank');
        }, index * 500);
      });
    }
  </script>
</body>
</html>
