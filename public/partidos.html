<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Próximos Partidos - DIBA FBC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap 5 CSS -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
    rel="stylesheet"
  >
  <!-- Font Awesome (opcional) -->
  <link 
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <style>
    :root {
      --azul: #003399;       /* Azul oscuro */
      --grana: #a50044;      /* Grana */
      --amarillo: #ffd700;   /* Dorado/Amarillo */
      --texto-claro: #ffffff;
      --texto-oscuro: #333333;
      --fondo-gris: #f4f4f4;
      --sombra: rgba(0, 0, 0, 0.2);
    }

    body {
      background: var(--fondo-gris);
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
    }

    /* Tarjetas de partidos */
    .match-card {
      border: none;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      max-width: 320px; /* Limita el ancho máximo de la tarjeta */
      margin: 0 auto;   /* Centra la tarjeta en su columna */
    }
    .match-card-top {
      background: var(--grana);
      color: var(--texto-claro);
      padding: 1rem;
      text-align: center;
      position: relative;
    }
    .match-card-top img {
      width: 70px; /* Escudos más grandes */
      margin: 0 0.5rem;
    }
    .match-card-body {
      padding: 1rem;
      text-align: center;
    }
    .match-card-body .btn {
      margin: 0.25rem;
    }

    /* Encabezado opcional */
    .header {
      background: var(--azul);
      color: var(--amarillo);
      padding: 1rem;
      text-align: center;
      margin-bottom: 1rem;
    }
    .header h1 {
      margin: 0;
    }
  </style>
</head>
<body>
  <!-- Cabecera opcional -->
  <div class="header">
    <h1>CALENDARIO Y PRÓXIMOS PARTIDOS</h1>
    <p>Horarios y encuentros de DIBA FBC</p>
  </div>

  <!-- Contenedor principal -->
  <div class="container my-5">
    <!-- Fila responsive: 3 col en grande, 2 en mediano, 1 en móvil -->
    <div class="row g-4">
      
      <!-- Tarjeta 1: DIBA FBC vs Caribe Soccer -->
      <div class="col-12 col-sm-6 col-lg-4">
        <div class="match-card">
          <div class="match-card-top">
            <img src="ESCUDO.png" alt="DIBA FBC">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQU5Lvu0ZFPO4NQaCyYMe-xHLatfG5oNHQtVNei0VRONoRlUPaTMI4mQxNDroztucFPKYo&usqp=CAU" alt="Caribe Soccer">
            <div class="mt-2">
              <strong>Amistoso 2014-2015-2016</strong>
            </div>
          </div>
          <div class="match-card-body">
            <h4 class="mb-2">Domingo, 09 de Marzo 2025 - 09:00 AM</h4>
            <p class="text-muted mb-1">Estadio: Parque de los Sueños</p>
            <p class="text-muted mb-1">Valor: $ 4000</p>
            <a href="#" class="btn btn-warning">Resultado</a>
          </div>
        </div>
      </div>

      <!-- Tarjeta 2: DIBA FBC vs Quiroz FC -->
      <div class="col-12 col-sm-6 col-lg-4">
        <div class="match-card">
          <div class="match-card-top">
            <img src="ESCUDO.png" alt="DIBA FBC">
            <img src="logo-rival3.png" alt="Quiroz FC">
            <div class="mt-2">
              <strong>Amistoso 2012-2013</strong>
            </div>
          </div>
          <div class="match-card-body">
            <h4 class="mb-2">Domingo, 09 de Marzo 2025 - 09:00 AM</h4>
            <p class="text-muted mb-1">Estadio: Parque de los Sueños</p>
            <p class="text-muted mb-1">Valor: $ 4000</p>
            <a href="#" class="btn btn-warning">Resultado</a>
          </div>
        </div>
      </div>

    </div> <!-- fin row -->
  </div> <!-- fin container -->

  <!-- Bootstrap JS -->
  <script 
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
  </script>
</body>
</html>
