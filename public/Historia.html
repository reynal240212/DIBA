<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Historia - DIBA FBC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Descubre la historia de DIBA FBC, sus logros y momentos más destacados en el fútbol amateur." />
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  
  <!-- Íconos de FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  <!-- Animate.css para animaciones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

  <!-- Librería AOS para efectos de scroll -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />

  <style>
    :root {
      --azul: #004D73;
      --amarillo: #FFD700;
      --fondo-claro: #f9f9f9;
    }

    body {
      background-color: #ffffff;
      color: var(--azul);
      font-family: 'Poppins', sans-serif;
      padding-top: 70px;
    }

    /* Navbar */
    .navbar {
      transition: all 0.3s ease-in-out;
    }

    .navbar.scrolled {
      background-color: var(--azul) !important;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .navbar-brand img {
      width: 50px;
    }

    .nav-link {
      font-weight: 600;
    }

    /* Hero Section con efecto Glassmorphism */
    .hero {
      background: linear-gradient(135deg, rgba(0, 77, 115, 0.8), rgba(255, 215, 0, 0.7)), url('fondo.jpg') center/cover no-repeat;
      height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #fff;
      position: relative;
    }

    .hero .content {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 10px;
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: bold;
    }

    /* Sección de Tarjetas */
    .timeline-section {
      background: var(--fondo-claro);
      padding: 4rem 0;
    }

    .timeline-section h2 {
      text-align: center;
      font-size: 2.5rem;
      font-weight: bold;
      color: var(--azul);
    }

    .card {
      border: none;
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
    }

    .card img {
      height: 200px;
      object-fit: cover;
    }

    /* Footer */
    footer {
      background: var(--azul);
      color: var(--amarillo);
      text-align: center;
      padding: 2rem;
    }

    footer a {
      color: var(--amarillo);
      text-decoration: none;
      font-weight: bold;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <img src="ESCUDO.png" alt="Logo DIBA FBC">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="Historia.html">Historia</a></li>
          <li class="nav-item"><a class="nav-link" href="ficha.html">Ficha Técnica</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div class="content animate__animated animate__fadeIn">
      <h1>Historia de DIBA FBC</h1>
      <p>Recorre los momentos más memorables de nuestro club.</p>
    </div>
  </section>

  <!-- Timeline -->
  <section class="timeline-section" data-aos="fade-up">
    <div class="container">
      <h2>Momentos Destacados</h2>
      <div class="row g-4">
        <div class="col-md-4">
          <div class="card">
            <img src="Noticia1.jpg" alt="Subcampeonato" loading="lazy">
            <div class="card-body">
              <h5 class="card-title">Subcampeonato 2013</h5>
              <p>Un partido vibrante que dejó huella en la historia del club.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 DIBA FBC | <a href="#">Política de Privacidad</a></p>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script>
    AOS.init();
    window.addEventListener("scroll", function() {
      document.querySelector(".navbar").classList.toggle("scrolled", window.scrollY > 50);
    });
  </script>

</body>
</html>
