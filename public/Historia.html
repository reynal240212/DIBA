<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>HISTORIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Íconos de Font Awesome (opcional) -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <style>
    /* ================================
       RESET
    =================================*/
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ================================
       ESTILOS BÁSICOS
    =================================*/
    body {
      font-family: Arial, sans-serif;
      /* Fondo retro estilo pergamino */
      background-color: #f7e9d3;
      background-image: url('https://www.transparenttextures.com/patterns/old-mathematics.png');
      color: #333;
      line-height: 1.5;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    :root {
      --azul-barca: #003399;
      --grana-barca: #a50044;
      --rojo-barca: #ff0000;
      --amarillo-barca: #ffd700;
      --texto-claro: #ffffff;
      --texto-oscuro: #333333;
      --fondo-gris: #f4f4f4;
    }

    /* ================================
       HEADER
    =================================*/
    header {
      background-color: var(--grana-barca);
      color: var(--texto-claro);
      padding: 1rem 0;
      text-align: center;
    }

    /* ================================
       SECCIÓN HERO
    =================================*/
    .hero {
      text-align: center;
      padding: 2rem 1rem;
      background-color: var(--fondo-gris);
    }
    .hero h1 {
      color: var(--azul-barca);
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    .hero p {
      max-width: 600px;
      margin: 0 auto;
    }

    /* ================================
       SECCIÓN TIMELINE
    =================================*/
    .timeline-section {
      padding: 2rem 1rem;
      max-width: 1300px;
      margin: 0 auto;
    }
    .timeline-section h2 {
      text-align: center;
      margin-bottom: 2rem;
      color: var(--grana-barca);
      font-size: 1.8rem;
      text-transform: uppercase;
      font-weight: bold;
    }
    .timeline-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    .timeline-item {
      background-color: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      text-align: center;
      transition: transform 0.3s;
    }
    .timeline-item:hover {
      transform: translateY(-5px);
    }
    .timeline-item img {
      width: 100%;
      height: auto;
      display: block;
    }
    .timeline-text {
      padding: 1rem;
      font-size: 0.95rem;
      color: #333;
      font-weight: bold;
    }

    /* ================================
       FOOTER
    =================================*/
    footer {
      background-color: var(--azul-barca);
      color: var(--texto-claro);
      text-align: center;
      padding: 1rem 0;
      margin-top: 2rem;
    }

  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <h4>HISTORIA DIBA FBC</h4>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h1>Explora Nuestro Mundo</h1>
    <p>Descubre un pedacito de nuestra Historia y los logros más destacados.</p>
  </section>

  <!-- TIMELINE (Distribución como en tu captura) -->
  <section class="timeline-section">
    <h2>Momentos Destacados</h2>
    <div class="timeline-grid">

      <div class="timeline-item">
        <img src="imagen1.jpg" alt="2008-2020">
        <div class="timeline-text">2008-2020. Los mejores éxitos deportivos de la historia</div>
      </div>

      <div class="timeline-item">
        <img src="imagen2.jpg" alt="1996-08">
        <div class="timeline-text">1996-08. Un club centenario</div>
      </div>

      <div class="timeline-item">
        <img src="imagen3.jpg" alt="1988-96">
        <div class="timeline-text">1988-96. La era del 'Dream Team'</div>
      </div>

      <!-- Agrega más elementos según necesites -->
      <!--
      <div class="timeline-item">
        <img src="imagen4.jpg" alt="Otro hito">
        <div class="timeline-text">Descripción de otro hito importante</div>
      </div>
      -->

    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2025 DIBA FBC. Todos los derechos reservados.</p>
  </footer>

</body>
</html>
