<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>HISTORIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Íconos de Font Awesome (opcional) -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      color: #333;
      line-height: 1.5;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    :root {
      --azul-barca: #003399;
      --grana-barca: #a50044;
      --rojo-barca: #ff0000;
      --amarillo-barca: #ffd700;
      --texto-claro: #ffffff;
      --texto-oscuro: #333333;
      --fondo-gris: #f4f4f4;
    }

    header {
      background-color: var(--grana-barca);
      color: var(--texto-claro);
      padding: 1rem 0;
      text-align: center;
    }

    .hero {
      text-align: center;
      padding: 2rem 1rem;
      background-color: var(--fondo-gris);
    }

    .hero h1 {
      color: var(--azul-barca);
      font-size: 2rem;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1rem;
      padding: 2rem 1rem;
    }

    .gallery-item {
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
    }

    footer {
      background-color: var(--azul-barca);
      color: var(--texto-claro);
      text-align: center;
      padding: 1rem 0;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <header>
    <h2>Galería de DIBA FBC</h2>
  </header>

  <section class="hero">
    <h1>Explora Nuestro Mundo</h1>
    <p>Descubre las fotos de nuestros eventos, entrenamientos y momentos especiales del club.</p>
  </section>

  <section class="gallery">
    <div class="gallery-item">
      <img src="https://via.placeholder.com/500x300" alt="Entrenamiento">
    </div>
    <div class="gallery-item">
      <img src="https://via.placeholder.com/500x300" alt="Partido">
    </div>
    <div class="gallery-item">
      <img src="https://via.placeholder.com/500x300" alt="Celebración">
    </div>
    <div class="gallery-item">
      <img src="https://via.placeholder.com/500x300" alt="Evento del club">
    </div>
  </section>

  <footer>
    <p>&copy; 2025 DIBA FBC. Todos los derechos reservados.</p>
  </footer>
</body>
</html>
