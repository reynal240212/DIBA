<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar Sesión | Nombre de Mi Página</title>
  <!-- Vincula Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-yH0ua7VUg98eN6+x1O5B0ydwGP8x1e7Nn/1qzzK6T9V8B39tP2eT4HmxOzTjTq1rjWUXWb2vFq3XjYc5GdyZJw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    /* Reset básico */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #f4f4f4;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-container {
      background: #ffffff;
      border-radius: 8px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      border: 2px solid #800000; /* Grana/maroon */
    }
    .logo {
      width: 100px;
      margin: 0 auto 0.5rem;
      display: block;
      transition: transform 0.3s ease;
    }
    .logo:hover {
      transform: scale(1.1);
    }
    .tagline {
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 1.5rem;
      font-style: italic;
    }
    h2 {
      font-size: 1.5rem;
      color: #333;
      margin-bottom: 1.5rem;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    input[type="email"],
    input[type="password"] {
      padding: 0.8rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
    }
    button.login-btn {
      padding: 0.8rem;
      background: #007bff; /* Azul de la paleta */
      border: none;
      color: #fff;
      font-size: 1rem;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button.login-btn:hover {
      background: #0056b3;
    }
    .social-login {
      margin-top: 1.5rem;
    }
    .social-login p {
      margin-bottom: 1rem;
      color: #666;
      font-size: 0.9rem;
    }
    .social-buttons {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
    }
    .social-buttons a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 45px;
      height: 45px;
      border-radius: 4px;
      color: #fff;
      font-size: 1.2rem;
      text-decoration: none;
      transition: opacity 0.3s, transform 0.3s;
    }
    .social-buttons a:hover {
      opacity: 0.9;
      transform: scale(1.05);
    }
    /* Botones de redes sociales con colores de la paleta */
    .social-buttons a.google {
      background: #db4437; /* Rojo */
    }
    .social-buttons a.facebook {
      background: #3b5998; /* Azul */
    }
    .social-buttons a.apple {
      background: #000000; /* Negro */
    }
    /* Ejemplo: se puede usar amarillo en detalles o hover, por ejemplo */
    .social-buttons a:hover {
      border: 1px solid #ffcc00; /* Amarillo */
    }
  </style>
</head>
<body>
  <div class="login-container">
    <!-- Escudo y leyenda -->
    <img src="ESCUDO.png" alt="Escudo de Mi Página" class="logo">
    <div class="tagline">Fuerza y Lealtad</div>
    
    <h2>Inicia Sesión en Nombre de Mi Página</h2>
    
    <!-- Formulario de inicio de sesión -->
    <form action="login-process.php" method="POST">
      <input type="email" name="email" placeholder="Correo electrónico" required>
      <input type="password" name="password" placeholder="Contraseña" required>
      <button class="login-btn" type="submit">Iniciar Sesión</button>
    </form>
    
    <!-- Opciones de acceso social -->
    <div class="social-login">
      <p>O inicia sesión con:</p>
      <div class="social-buttons">
        <a href="auth-google.php" class="google"><i class="fa-brands fa-google"></i></a>
        <a href="auth-facebook.php" class="facebook"><i class="fa-brands fa-facebook-f"></i></a>
        <a href="auth-apple.php" class="apple"><i class="fa-brands fa-apple"></i></a>
      </div>
    </div>
  </div>
</body>
</html>
