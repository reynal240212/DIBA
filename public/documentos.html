<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Gestión Documental - DIBA FBC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Íconos de Font Awesome (opcional) -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <style>
    /* ================================
       RESET
    =================================*/
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      color: #333;
      line-height: 1.5;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    :root {
      --azul-barca: #003399;
      --grana-barca: #a50044;
      --rojo-barca: #ff0000;
      --amarillo-barca: #ffd700;
      --texto-claro: #ffffff;
      --texto-oscuro: #333333;
      --fondo-gris: #f4f4f4;
    }

    header {
      background-color: var(--grana-barca);
      color: var(--texto-claro);
      padding: 1rem 0;
      text-align: center;
    }

    .hero {
      text-align: center;
      padding: 2rem 1rem;
      background-color: var(--fondo-gris);
    }

    .hero h1 {
      color: var(--azul-barca);
      font-size: 2rem;
    }

    .document-list {
      max-width: 900px;
      margin: 2rem auto;
      padding: 1rem;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .document-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      border-bottom: 1px solid #ddd;
    }

    .document-item a {
      color: var(--azul-barca);
      font-weight: bold;
    }

    .document-item i {
      color: var(--grana-barca);
    }

    footer {
      background-color: var(--azul-barca);
      color: var(--texto-claro);
      text-align: center;
      padding: 1rem 0;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <header>
    <h2>Gestión Documental - DIBA FBC</h2>
  </header>

  <section class="hero">
    <h1>Accede a los documentos del club</h1>
    <p>Encuentra aquí todos los archivos relevantes para la gestión y administración.</p>
  </section>

  <section class="document-list">
    <div class="document-item">
      <a href="#"><i class="fa fa-file-pdf"></i> Reglamento del Club</a>
      <span>PDF</span>
    </div>
    <div class="document-item">
      <a href="#"><i class="fa fa-file-word"></i> Ficha de Inscripción</a>
      <span>DOCX</span>
    </div>
    <div class="document-item">
      <a href="#"><i class="fa fa-file-excel"></i> Listado de Jugadores</a>
      <span>XLSX</span>
    </div>
  </section>

  <footer>
    <p>&copy; 2025 DIBA FBC. Todos los derechos reservados.</p>
  </footer>
</body>
</html>
