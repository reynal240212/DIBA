<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión Documental - DIBA FBC</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      color: #333;
      line-height: 1.5;
    }

    :root {
      --azul-barca: #003399;
      --grana-barca: #a50044;
      --rojo-barca: #ff0000;
      --amarillo-barca: #ffd700;
      --texto-claro: #ffffff;
      --texto-oscuro: #333333;
      --fondo-gris: #f4f4f4;
    }

    header {
      background-color: var(--grana-barca);
      color: var(--texto-claro);
      padding: 1rem 0;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .logo {
      width: 80px;
      transition: transform 0.3s;
    }

    .logo:hover {
      transform: scale(1.1);
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
    }

    .nav-links a {
      color: var(--texto-claro);
      font-weight: bold;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    .nav-links a:hover {
      color: var(--amarillo-barca);
    }

    .hero {
      width: 100%;
      height: 400px;
      background: url("documentos-bg.jpg") center/cover no-repeat;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
    }

    .hero-content {
      max-width: 1200px;
      margin: 0 2rem 2rem;
      color: var(--texto-claro);
    }

    .hero-content h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      font-weight: bold;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.7);
    }

    .news-section {
      background-color: var(--fondo-gris);
      padding: 2rem 1rem;
      text-align: center;
    }

    footer {
      background-color: var(--azul-barca);
      color: var(--texto-claro);
      text-align: center;
      padding: 20px 0;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="top-bar">
      <div class="top-bar-left">
        <!-- LOGO DEL CLUB -->
        <img src="ESCUDO.png" alt="Escudo DIBA FBC" class="logo" />
        <!-- NAVEGACIÓN PRINCIPAL -->
        <div class="nav-links">
          <a href="index.html"><i class="fa fa-home"></i> Inicio</a>
          <a href="documentos.html"><i class="fa fa-file"></i> Gestión Documental</a>
          <a href="ficha.html"><i class="fa fa-clipboard"></i> Ficha Técnica</a>
          <a href="jugadores.html"><i class="fa fa-users"></i> Jugadores</a>
          <a href="partidos.html"><i class="fa fa-calendar"></i> Partidos</a>
          <a href="noticias.html"><i class="fa fa-newspaper"></i> Noticias</a>
          <a href="contacto.html"><i class="fa fa-envelope"></i> Contacto</a>
        </div>
      </div>
      <div class="top-bar-right">
        <a href="registro.html">Registrarse</a>
        <a href="login.html">Iniciar Sesión</a>
      </div>
    </div>
  </header>


  <main>
    <section class="hero">
      <div class="hero-content">
        <h1>Gestión Documental</h1>
        <p>Consulta y gestiona los documentos del club de manera organizada y accesible.</p>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 DIBA FBC. Todos los derechos reservados.</p>
  </footer>
</body>
</html>
