<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Documentos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1E1E2F;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: #2A2A3B;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
        }
        h1 {
            color: #FFD700;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
        }
        .btn {
            width: 100%;
            padding: 10px;
            background-color: #FFD700;
            color: black;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #FFC107;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container" id="login-container">
        <h1>Inicio de Sesión</h1>
        <p>Solo administradores pueden acceder.</p>
        <input type="text" id="username" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">
        <button class="btn" onclick="login()">Ingresar</button>
    </div>

    <div class="container hidden" id="admin-panel">
        <h1>Gestión de Documentos</h1>
        <p>Administra los documentos de los jugadores aquí.</p>
        <a href="subir_documento.html" class="btn">Subir Documento</a>
        <a href="ver_documentos.html" class="btn">Ver Documentos</a>
        <br><br>
        <button class="btn" onclick="logout()">Cerrar Sesión</button>
    </div>

    <script>
        function login() {
            var username = document.getElementById("username").value;
            var password = document.getElementById("password").value;

            // Simulación de autenticación básica
            if (username === "admin" && password === "1234") {
                document.getElementById("login-container").classList.add("hidden");
                document.getElementById("admin-panel").classList.remove("hidden");
                localStorage.setItem("adminLoggedIn", "true"); // Guarda sesión
            } else {
                alert("Credenciales incorrectas");
            }
        }

        function logout() {
            localStorage.removeItem("adminLoggedIn");
            document.getElementById("admin-panel").classList.add("hidden");
            document.getElementById("login-container").classList.remove("hidden");
        }

        // Mantener sesión activa si ya inició sesión antes
        window.onload = function () {
            if (localStorage.getItem("adminLoggedIn") === "true") {
                document.getElementById("login-container").classList.add("hidden");
                document.getElementById("admin-panel").classList.remove("hidden");
            }
        };
    </script>

</body>
</html>
